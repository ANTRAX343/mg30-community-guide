name: Guía Comunitaria NUX MG-30 — Firmware v5.0.2
description: Documentación comunitaria completa para la pedalera NUX MG-30 con firmware v5.0.2
url: https://antrax343.github.io/mg30-community-guide

markdown: kramdown
highlighter: rouge
theme: minima

plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

exclude:
  - vendor/
  - .vendor/
  - node_modules/
  - .sass-cache/
